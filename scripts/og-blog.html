<!--
  ConvertChat — Blog OG/Hero Image Template
  Canvas: 1200 × 630 px (fixed, no scroll)

  GENERATION WORKFLOW (per post):
  ─────────────────────────────────────────────────────────────────────────────
  1. Edit the <h1 id="title"> text below to the exact post title.
  2. Serve from the REPO ROOT so that /public/ assets resolve correctly
     (Playwright MCP blocks file:// URLs; serving from scripts/ would 404 the logo):
       cd /absolute/path/to/convertchat-website
       python3 -m http.server 8787
     Then navigate in Playwright MCP:
       browser_navigate  →  http://localhost:8787/scripts/og-blog.html
  3. Resize the viewport to exactly 1200 × 630:
       browser_resize  →  { width: 1200, height: 630 }
  4. Confirm the serif title rendered in Newsreader (not Georgia fallback) — the
     letter forms should have visible optical-size serifs, not the blocky Georgia look.
     If Georgia is rendering, the Google Fonts request failed (check network/console).
  5. Take a viewport screenshot (NOT fullPage):
       browser_take_screenshot  →  { fullPage: false }
     (fullPage:false captures the viewport, which is exactly the 1200×630 canvas)
  6. Save the PNG to:
       public/og/blog/<slug>.png
  7. Verify the file is < 300 KB. If larger, compress with pngquant or oxipng:
       pngquant --force --output public/og/blog/<slug>.png public/og/blog/<slug>.png
     or: oxipng -o 4 public/og/blog/<slug>.png
  8. Wire the image in the post's frontmatter:
       image: "/og/blog/<slug>.png"
  ─────────────────────────────────────────────────────────────────────────────
  TEMPLATE VARIABLES:
    #title  — swap text content before each screenshot
  ─────────────────────────────────────────────────────────────────────────────
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <title>OG Template — ConvertChat Blog</title>

    <!-- Newsreader serif (matches site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset / canvas ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #06060f;
      }

      /* ── Root canvas ── */
      .canvas {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #06060f;
        font-family: "Newsreader", Georgia, serif;
        color: #ffffff;
      }

      /* ── Background blobs (match og-en.png: green top-left, purple bottom-right) ── */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
      }

      .blob-green {
        width: 520px;
        height: 520px;
        top: -140px;
        left: -80px;
        background: radial-gradient(circle, #22c55e 0%, #16a34a 40%, transparent 70%);
        opacity: 0.72;
      }

      .blob-purple {
        width: 580px;
        height: 500px;
        bottom: -160px;
        right: -100px;
        background: radial-gradient(circle, #7c3aed 0%, #6d28d9 35%, transparent 70%);
        opacity: 0.75;
      }

      /* Subtle dark vignette overlay to darken mid-section (keeps text legible) */
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 70% at 60% 50%, transparent 30%, rgba(6, 6, 15, 0.55) 100%);
        pointer-events: none;
      }

      /* ── Rainbow accent bar — bottom edge ── */
      .rainbow-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          #7c3aed 0%,
          #ec4899 18%,
          #f97316 32%,
          #eab308 48%,
          #22c55e 63%,
          #06b6d4 80%,
          #3b82f6 100%
        );
      }

      /* ── Content layout ── */
      .content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 52px 72px 48px;
      }

      /* ── Logo row ── */
      .logo-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-img {
        height: 36px;
        width: auto;
        /* Force logo to pure white regardless of source colors */
        filter: brightness(0) invert(1);
      }

      /* ── Title ── */
      .title-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 24px 0 16px;
      }

      #title {
        font-family: "Newsreader", Georgia, serif;
        font-size: 72px;
        font-weight: 500;
        line-height: 1.08;
        letter-spacing: -0.02em;
        color: #ffffff;
        max-width: 960px;
        /* Clamp to 3 lines so long titles don't overflow */
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── Footer row ── */
      .footer-row {
        display: flex;
        align-items: center;
      }

      .site-url {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <!-- Background atmosphere -->
      <div class="blob blob-green"></div>
      <div class="blob blob-purple"></div>
      <div class="vignette"></div>

      <!-- Rainbow bottom bar -->
      <div class="rainbow-bar"></div>

      <!-- Main content -->
      <div class="content">
        <!-- Top: logo -->
        <div class="logo-row">
          <img
            class="logo-img"
            src="/public/logo-full-white.png"
            alt="ConvertChat"
          />
        </div>

        <!-- Middle: post title (edit this before each screenshot) -->
        <div class="title-wrap">
          <h1 id="title">How to reactivate dormant WhatsApp leads</h1>
        </div>

        <!-- Bottom: site URL -->
        <div class="footer-row">
          <span class="site-url">convertchat.co/blog</span>
        </div>
      </div>
    </div>
  </body>
</html>
